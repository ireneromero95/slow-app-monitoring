services:
  slow-api:
    build: ./app
    environment:
      - DESIRED_PATH=/work
      - PORT=8080
      - NUMBER=1
    deploy:
      resources:
        limits:
          memory: 32m
  slow-api_2:
    build: ./app
    environment:
      - DESIRED_PATH=/work
      - PORT=8080
      - NUMBER=2
    deploy:
      resources:
        limits:
          memory: 32m
  slow-api_3:
    build: ./app
    environment:
      - DESIRED_PATH=/work
      - PORT=8080
      - NUMBER=3
    deploy:
      resources:
        limits:
          memory: 32m
  nginx-lb:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8000:80'
    depends_on:
      - slow-api
      - slow-api_2
      - slow-api_3
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - -nginx.scrape-uri=http://nginx-lb/nginx_status
    depends_on:
      - nginx-lb
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - nginx-exporter
      - cadvisor

  alertmanager:
    image: prom/alertmanager
    env_file:
      - .env
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - '9093:9093'
  loadgen:
    image: alpine
    command: >
      sh -c "apk add --no-cache curl &&
             while true; do
               curl -s http://nginx-lb/work > /dev/null;
               sleep 0.2;
             done"
    depends_on:
      - nginx-lb
networks:
  default:
    driver: bridge
