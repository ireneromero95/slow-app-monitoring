groups:
  - name: slow-app-rules
    rules:
      - alert: HighInFlightConnections
        expr: sum(nginx_connections_reading + nginx_connections_writing) > 0
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: 'High in-flight connections at Nginx'
          description: 'sum(reading+writing) > 0 for 10s. Increase capacity or reduce traffic.'

      - alert: HighMemoryUsage
        expr: |
          max(container_memory_working_set_bytes{id=~"/docker/.*"})
          /
          max(container_spec_memory_limit_bytes{id=~"/docker/.*"})
          > 0.1
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: 'Container using >10% of its memory limit'
          description: 'Working set / limit > 0.1 for 10s on Docker containers.'
